name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      - run: uv run ruff check .

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      # Headless Qt for widget tests on CI runners
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install Qt/OpenGL system libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0 libdbus-1-3
      - run: uv sync --frozen
      - run: uv run pytest -v

  # Golden harness (M1 gate): generated cases must run clean against pinned
  # OpenFOAM v2506, verified without FlowDesk-specific tooling (PRD §12.3).
  golden:
    runs-on: ubuntu-latest
    container:
      image: opencfd/openfoam-default:2506
      options: --user root
    env:
      FLOWDESK_SLOW_TESTS: "1"
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install Qt system libraries
        run: |
          apt-get update
          apt-get install -y libegl1 libgl1 libxkbcommon-x11-0 libdbus-1-3
      - run: uv sync --frozen
      - name: Run gate tests with native OpenFOAM
        run: |
          source /usr/lib/openfoam/openfoam2506/etc/bashrc || true
          uv run pytest tests/test_openfoam_gate.py -v
