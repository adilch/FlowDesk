# FlowDesk error-explanation table (PRD §4.7). Grows from real failures.
# Each entry: a regex matched against the verbatim FOAM error block, and the
# plain-language layer shown above it. Never speculate - explain only what the
# pattern reliably means.

- pattern: "Maximum number of iterations exceeded.*GAMG"
  explanation: >-
    The pressure solver failed to converge — usually mesh quality or boundary
    conditions. Check: high-skew cells (Mesh stage ⚠), and that at least one
    outlet fixes the pressure (BC stage).

- pattern: "FOAM FATAL.*[Ff]loating point exception"
  explanation: >-
    The solution diverged (a number became infinite). Common causes: too
    aggressive numerics for a cold start (try the Robust preset), bad mesh
    cells, or inconsistent boundary conditions. The iteration where residuals
    started climbing in the plot usually points at the moment it went wrong.

- pattern: "Continuity error cannot be removed by adjusting the outflow"
  explanation: >-
    Mass cannot leave the domain consistently — the inflow and outflow boundary
    conditions are over- or under-constrained. Check that exactly the intended
    patches are inlets/outlets and that backflow-safe outlets are used
    (Pressure outlet, not Outflow, when recirculation can occur).

- pattern: "cannot find file.*polyMesh"
  explanation: >-
    The mesh is missing — the case has not been meshed (or the mesh was
    deleted). Run Generate Mesh in the Mesh stage first.

- pattern: "Unable to set reference cell for field p"
  explanation: >-
    Nothing fixes the pressure level: a fully enclosed case needs a pressure
    reference (FlowDesk sets pRefCell/pRefValue when 'fully enclosed domain'
    is checked in the BC stage), or one boundary must fix pressure.

- pattern: "keyword.*is undefined in dictionary"
  explanation: >-
    A dictionary entry is missing. If you hand-edited case files, compare with
    what FlowDesk generates (the ✎ ownership badges show what you own); use
    'Take back control' to restore the managed value.

- pattern: "Wrong token type.*expected"
  explanation: >-
    A dictionary has a syntax error — usually from a manual edit. The file and
    line are named in the error above. FlowDesk never rewrites files it cannot
    parse (they are marked detached), so the fix must be made in the editor.

- pattern: "MPI_ABORT|mpirun.*exit"
  explanation: >-
    A parallel rank crashed; the first FOAM error above this message is the
    real cause. If there is none, the machine may have run out of memory —
    check the WSL memory cap in Settings (§8: default is 50% of host RAM).

- pattern: "No times selected"
  explanation: >-
    The solver finished but wrote no results, so there is nothing to
    reconstruct. This almost always means the write interval is larger than the
    run length — for a transient run the 'Write every (seconds)' value on the
    Run stage must be ≤ the end time, or the run never reaches a save point.
    Lower it and run again.
